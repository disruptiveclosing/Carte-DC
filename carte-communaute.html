<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte · Disruptive Closing</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dc-dark: #0A1520;
      --dc-warm: #F8F5F0;
      --dc-green: #3BD851;
      --dc-red: #E85D40;
      --dc-amber: #F5A623;
      --dc-border: #e2ddd6;
    }

    body { font-family: "Calibri", "Segoe UI", sans-serif; background: var(--dc-warm); color: var(--dc-dark); }

    header {
      background: var(--dc-dark);
      padding: 0 1.5rem;
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo svg { height: 32px; width: auto; }
    .header-tag {
      font-family: "Nunito", sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dc-green);
      background: rgba(59,216,81,0.12);
      border: 1px solid rgba(59,216,81,0.3);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-header {
      font-family: "Nunito", sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-header:hover { opacity: 0.85; }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-events { background: transparent; color: var(--dc-green); border: 1px solid rgba(59,216,81,0.5); }

    .layout { display: flex; height: calc(100vh - 62px); min-height: 400px; }

    .sidebar { width: 360px; flex-shrink: 0; overflow-y: auto; background: #fff; border-right: 1px solid var(--dc-border); display: flex; flex-direction: column; }

    .tab-bar { display: flex; border-bottom: 1px solid var(--dc-border); }
    .tab { flex: 1; padding: 13px; text-align: center; font-size: 13px; font-weight: 700; font-family: "Nunito", sans-serif; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: color 0.15s; }
    .tab.active { color: var(--dc-dark); border-bottom-color: var(--dc-green); }

    .tab-content { display: none; padding: 1rem; }
    .tab-content.active { display: block; }

    label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; margin-top: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    label:first-child { margin-top: 0; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid var(--dc-border); border-radius: 6px; font-size: 14px; background: #fff; color: var(--dc-dark); font-family: "Calibri", sans-serif; }
    input:focus, select:focus { outline: none; border-color: var(--dc-green); box-shadow: 0 0 0 2px rgba(59,216,81,0.15); }
    button.primary { width: 100%; margin-top: 14px; padding: 11px; background: var(--dc-green); color: var(--dc-dark); border: none; border-radius: 6px; font-size: 14px; font-weight: 800; font-family: "Nunito", sans-serif; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s; }
    button.primary:hover { background: #2ec447; }
    button.primary:disabled { background: #aaa; cursor: not-allowed; color: #fff; }

    #formStatus { font-size: 13px; margin-top: 8px; min-height: 18px; }
    .ok { color: #1a8a30; } .err { color: var(--dc-red); }

    .filters { padding: 12px 1rem; border-bottom: 1px solid var(--dc-border); display: flex; gap: 6px; flex-wrap: wrap; background: var(--dc-warm); }
    .pill { font-size: 12px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--dc-border); background: #fff; color: #555; cursor: pointer; font-family: "Nunito", sans-serif; font-weight: 700; transition: all 0.15s; }
    .pill.active { background: var(--dc-dark); color: var(--dc-green); border-color: var(--dc-dark); }

    #memberList { padding: 0; }
    .member-card { padding: 12px 1rem; border-bottom: 1px solid #f0ebe3; cursor: pointer; transition: background 0.1s; }
    .member-card:hover { background: var(--dc-warm); }
    .member-card .name { font-size: 14px; font-weight: 700; font-family: "Nunito", sans-serif; color: var(--dc-dark); }
    .member-card .meta { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; font-family: "Nunito", sans-serif; padding: 2px 8px; border-radius: 4px; margin-top: 4px; }
    .badge.recherche { background: #fce8e3; color: #b83a20; }
    .badge.mission { background: #e0f8e4; color: #1a7a2a; }
    .badge.dispo { background: #fef3e0; color: #9a6a0a; }

    .empty { padding: 2rem 1rem; text-align: center; color: #aaa; font-size: 14px; }

    #map { flex: 1; height: 100%; }

    @media (max-width: 700px) {
      header { height: 52px; padding: 0 1rem; }
      .header-tag { display: none; }

      .layout { flex-direction: column-reverse; height: calc(100vh - 52px); }

      .sidebar { width: 100%; flex-shrink: 0; height: 55vh; overflow-y: auto; border-right: none; border-top: 1px solid var(--dc-border); }

      #map { height: 45vh; flex: none; }

      .tab { padding: 14px 8px; font-size: 14px; }
      .tab-content { padding: 12px; }

      input, select { font-size: 16px; }
      button.primary { padding: 14px; font-size: 15px; }

      .filters { padding: 10px 12px; }
      .pill { font-size: 13px; padding: 6px 12px; }

      .member-card { padding: 12px; }
      .member-card .name { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="Logo.svg" alt="Disruptive Closing" style="height: 36px; width: auto;" />
    <span class="header-tag">Carte de la communauté</span>
  </div>
  <div class="header-actions">
    <a href="#" class="btn-header btn-wa">💬 Créer un groupe local</a>
    <a href="#" class="btn-header btn-events">📅 Prochains événements DC</a>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('membres', this)">Membres</div>
      <div class="tab" onclick="showTab('rejoindre', this)">Rejoindre</div>
    </div>

    <!-- Onglet membres -->
    <div id="tab-membres" class="tab-content active">
      <div id="memberList"><div class="empty">Chargement…</div></div>
    </div>

    <!-- Onglet rejoindre -->
    <div id="tab-rejoindre" class="tab-content">
      <label>Prénom *</label>
      <input type="text" id="f_prenom" placeholder="Marie" maxlength="40" />
      <label>Nom *</label>
      <input type="text" id="f_nom" placeholder="Dupont" maxlength="60" />
      <label>Email *</label>
      <input type="email" id="f_mail" placeholder="marie@email.com" />
      <label>Téléphone</label>
      <input type="tel" id="f_tel" placeholder="+33 6 00 00 00 00" maxlength="20" />
      <p style="font-size:12px;color:#888;background:#f5f5f3;border-radius:6px;padding:8px 10px;margin-top:8px;">🔒 Ton email et ton téléphone sont confidentiels — ils ne sont pas affichés sur la carte et restent réservés à l'administrateur.</p>
      <label>Ville *</label>
      <input type="text" id="f_ville" placeholder="Lyon, Paris, Bordeaux…" maxlength="60" />
      <label>Statut *</label>
      <select id="f_statut">
        <option value="">— Choisir —</option>
        <option>En recherche de mission</option>
        <option>En mission</option>
        <option>Disponible bientôt</option>
      </select>
      <label>Niche / Domaine d'expertise</label>
      <input type="text" id="f_niche" placeholder="Marketing, Tech, Finance…" maxlength="80" />
      <label>Lien réseau social</label>
      <input type="url" id="f_social" placeholder="https://linkedin.com/in/…" />
      <div style="display:flex;align-items:center;gap:10px;margin-top:14px;padding:12px;background:#f0f0f8;border-radius:8px;border:1px solid #d0cce8;">
        <input type="checkbox" id="f_membreDC" style="width:18px;height:18px;flex-shrink:0;accent-color:#2D3270;" />
        <label for="f_membreDC" style="margin:0;font-size:13px;text-transform:none;letter-spacing:0;color:#2D3270;font-weight:700;cursor:pointer;">Je fais partie de l'accompagnement Disruptive Closing</label>
      </div>
      <div id="formStatus"></div>
      <button class="primary" id="submitBtn" onclick="submitForm()">Rejoindre la carte</button>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwW09-GnsE6IrNsi6fQ5R4NRKkb8euYEaz_EXz1mB70BrhU9Zo59tVR8LAWZPiD_wMS/exec";

const COLORS = {
  "En recherche de mission": { fill:"#E85D40", stroke:"#b83a20" },
  "En mission":              { fill:"#3BD851", stroke:"#1a8a30" },
  "Disponible bientôt":      { fill:"#F5A623", stroke:"#9a6a0a" }
};

function badgeClass(s){ return s==="En mission"?"mission":s==="Disponible bientôt"?"dispo":"recherche"; }

let map, allMembers = [], mapMarkers = [], activeFilter = "tous";
const coordsCache = {};

async function geocode(city){
  const key = city.toLowerCase().trim();
  if(coordsCache[key]) return coordsCache[key];
  const normalized = key.replace(/\s+/g, "-");
  const queries = [
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&countrycodes=fr&format=json&limit=1`,
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(normalized)}&countrycodes=fr&format=json&limit=1`,
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+", France")}&format=json&limit=1`
  ];
  for(const url of queries){
    try {
      const res = await fetch(url);
      const data = await res.json();
      if(data.length > 0){
        const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        coordsCache[key] = coords;
        return coords;
      }
    } catch(e) {}
  }
  return null;
}

function showTab(id, el){
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  el.classList.add("active");
}

function setFilter(f, el){
  activeFilter = f;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  renderAll();
}

async function renderAll(){
  const filtered = activeFilter === "tous" ? allMembers : allMembers.filter(m => m.Statut === activeFilter);
  renderList(filtered);
  await renderMarkers(filtered);
}

const DC_BADGE = `<span style="display:inline-flex;align-items:center;gap:4px;background:#2D3270;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:5px;font-family:Nunito,sans-serif;">DC</span>`;

function renderList(members){
  const el = document.getElementById("memberList");
  if(!members.length){ el.innerHTML = '<div class="empty">Aucun membre pour ce filtre.</div>'; return; }
  el.innerHTML = members.map((m,i) => `
    <div class="member-card" onclick="focusMember(${allMembers.indexOf(m)})">
      <div class="name">${m.Prénom} ${m.Nom}${m["Membre DC"]==="Oui"?DC_BADGE:""}</div>
      <div class="meta">📍 ${m.Ville}${m.Niche ? " · " + m.Niche : ""}</div>
    </div>`).join("");
}

const DC_ICON = L.divIcon({
  className: "",
  html: `<div style="width:32px;height:32px;border-radius:50%;background:#2D3270;border:2px solid #3BD851;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;font-weight:800;font-size:10px;color:white;box-shadow:0 2px 6px rgba(0,0,0,0.35);letter-spacing:0.02em;">DC</div>`,
  iconSize: [32, 32],
  iconAnchor: [16, 16],
  popupAnchor: [0, -18]
});

async function renderMarkers(members){
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
  for(const m of members){
    const coords = await geocode(m.Ville);
    if(!coords) continue;
    const isDC = m["Membre DC"] === "Oui";
    const social = m.Social ? `<br><a href="${m.Social}" target="_blank" style="color:#3BD851;font-size:12px">Voir le profil</a>` : "";
    const dcTag = isDC ? `<span style="background:#2D3270;color:#3BD851;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:4px;">DC</span>` : "";
    const popup = `<div style="font-size:13px;min-width:170px;font-family:Calibri,sans-serif;">
      <b style="font-size:14px;font-family:Nunito,sans-serif;">${m.Prénom} ${m.Nom}</b>${dcTag}<br><br>
      📍 ${m.Ville}${m.Niche?"<br>🎯 "+m.Niche:""}${social}
    </div>`;
    let mk;
    if(isDC){
      mk = L.marker(coords, { icon: DC_ICON }).addTo(map).bindPopup(popup);
    } else {
      mk = L.circleMarker(coords, { radius:9, fillColor:"#3BD851", color:"#1a8a30", weight:2, opacity:1, fillOpacity:0.9 })
        .addTo(map).bindPopup(popup);
    }
    mk._memberId = allMembers.indexOf(m);
    mapMarkers.push(mk);
  }
}

async function focusMember(idx){
  const m = allMembers[idx];
  const coords = await geocode(m.Ville);
  if(!coords) return;
  map.flyTo(coords, 10, { duration:1 });
  const mk = mapMarkers.find(m => m._memberId === idx);
  if(mk) setTimeout(() => mk.openPopup(), 1100);
}

async function loadMembers(){
  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    allMembers = (json.data || []).filter(m => m.Prénom);
    renderAll();
  } catch(e) {
    document.getElementById("memberList").innerHTML = '<div class="empty">Erreur de chargement. Vérifie que le script est bien déployé.</div>';
  }
}

async function submitForm(){
  const prenom = document.getElementById("f_prenom").value.trim();
  const nom    = document.getElementById("f_nom").value.trim();
  const mail   = document.getElementById("f_mail").value.trim();
  const tel    = document.getElementById("f_tel").value.trim();
  const ville  = document.getElementById("f_ville").value.trim();
  const statut = document.getElementById("f_statut").value;
  const niche  = document.getElementById("f_niche").value.trim();
  const social   = document.getElementById("f_social").value.trim();
  const membreDC = document.getElementById("f_membreDC").checked ? "Oui" : "Non";
  const st     = document.getElementById("formStatus");
  const btn    = document.getElementById("submitBtn");

  if(!prenom||!nom||!mail||!ville||!statut){
    st.textContent = "Merci de remplir les champs obligatoires (*).";
    st.className = "err"; return;
  }
  const coords = await geocode(ville);
  if(!coords){
    st.textContent = `Ville "${ville}" introuvable. Vérifie l'orthographe.`;
    st.className = "err";
    btn.disabled = false; btn.textContent = "Rejoindre la carte";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Envoi en cours…";
  st.textContent = "";

  try {
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ Prénom:prenom, Nom:nom, Mail:mail, Tel:tel, Ville:ville, Statut:statut, Niche:niche, Social:social, "Membre DC":membreDC })
    });
    allMembers.push({ Prénom:prenom, Nom:nom, Mail:mail, Tel:tel, Ville:ville, Statut:statut, Niche:niche, Social:social, "Membre DC":membreDC });
    renderAll();
    st.textContent = `Bienvenue ${prenom} ! Tu apparais maintenant sur la carte.`;
    st.className = "ok";
    ["f_prenom","f_nom","f_mail","f_tel","f_ville","f_niche","f_social"].forEach(id => document.getElementById(id).value="");
    document.getElementById("f_statut").value="";
    document.getElementById("f_membreDC").checked = false;
    showTab("membres", document.querySelectorAll(".tab")[0]);
  } catch(e) {
    st.textContent = "Erreur lors de l'envoi. Réessaie.";
    st.className = "err";
  }
  btn.disabled = false;
  btn.textContent = "Rejoindre la carte";
}

window.addEventListener("DOMContentLoaded", () => {
  map = L.map("map", { center:[46.8,2.3], zoom:6 });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution:"© OpenStreetMap contributors", maxZoom:18
  }).addTo(map);
  setTimeout(() => map.invalidateSize(), 300);
  loadMembers();
});
</script>
</body>
</html>
